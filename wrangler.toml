name = "shortr"
main = "src/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# `LINKS_NAMESPACE_ID` mirrors the KV id below so the admin login URL
# `/<KV_ID>/<ADMIN_TOKEN>` can be assembled at runtime.
[vars]
PUBLIC_BASE = ""
RESERVED_SLUGS = "api,admin,login,signup,logout,my,assets,static,favicon.ico,robots.txt,_health,healthz"
DEFAULT_SLUG_LENGTH = "4"
MAX_URL_LENGTH = "2048"
ALLOW_PUBLIC = "true"
LINKS_NAMESPACE_ID = "24fe2c029739451e9bfad3f9b3432ea8"

# Required username for admin login. After unlocking the admin login page with
# `/<KV_ID>/<ADMIN_TOKEN>`, sign in as this user (you must register a normal
# account with this username first via /signup, then enter that password).
ADMIN_USER = "admin"

# Optional. Set this to enable hostname-based short links such as
# `my.example.com` or `my.example.com/abc`. Cloudflare must already route
# `*.<BASE_DOMAIN>` to this Worker (see [[routes]] below).
BASE_DOMAIN = ""

# Cloudflare Turnstile site key (public). Pair with `wrangler secret put TURNSTILE_SECRET`.
TURNSTILE_SITEKEY = "0x4AAAAAADUWeltJZaDJIr3b"

[[kv_namespaces]]
binding = "LINKS"
id = "24fe2c029739451e9bfad3f9b3432ea8"

# Bound apex host. wrangler auto-creates the DNS + SSL records on this zone.
[[routes]]
pattern = "shortr.095233.xyz"
custom_domain = true

# Wildcard subdomain short links require a separate DNS step: add
#     *.shortr   CNAME  shortr.095233.xyz   (proxied)
# in the 095233.xyz zone, then uncomment the route below and redeploy.
# After that, BASE_DOMAIN above can be set to "shortr.095233.xyz".
# [[routes]]
# pattern = "*.shortr.095233.xyz/*"
# zone_name = "095233.xyz"

