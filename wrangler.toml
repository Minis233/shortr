name = "shortr"
main = "src/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# `LINKS_NAMESPACE_ID` mirrors the KV id below so the admin login URL
# `/<KV_ID>/<ADMIN_TOKEN>` can be assembled at runtime.
[vars]
PUBLIC_BASE = ""
RESERVED_SLUGS = "api,admin,login,signup,logout,my,assets,static,favicon.ico,robots.txt,_health,healthz"
DEFAULT_SLUG_LENGTH = "4"
MAX_URL_LENGTH = "2048"
ALLOW_PUBLIC = "true"
LINKS_NAMESPACE_ID = "24fe2c029739451e9bfad3f9b3432ea8"

# Required username for admin login. After unlocking the admin login page with
# `/<KV_ID>/<ADMIN_TOKEN>`, sign in as this user (you must register a normal
# account with this username first via /signup, then enter that password).
ADMIN_USER = "admin"

# Optional. Set this to enable hostname-based short links such as
# `my.example.com` or `my.example.com/abc`. Cloudflare must already route
# `*.<BASE_DOMAIN>` to this Worker (see [[routes]] below).
BASE_DOMAIN = ""

# Optional Cloudflare Turnstile keys. Empty = disabled (no captcha on signup).
# Site key is public, secret is loaded via `wrangler secret put TURNSTILE_SECRET`.
TURNSTILE_SITEKEY = ""

# Replace `id` with the namespace ID printed by:
#   npx wrangler kv namespace create LINKS
[[kv_namespaces]]
binding = "LINKS"
id = "24fe2c029739451e9bfad3f9b3432ea8"

# Wildcard custom domains. Pick the host pattern that matches your zone.
# Examples:
#   pattern = "s.example.com/*"          one host, any path (a single redirect host)
#   pattern = "*.example.com/*"          every subdomain on the zone (host slugs)
#   pattern = "example.com/*"            apex on the zone
# All host names are zone-scoped, so the zone must already exist on this Cloudflare account.
# `custom_domain = true` only works for a single host; use a route entry for wildcards.
#
# To enable host-slug short links you typically need *both* the apex and the
# wildcard route plus BASE_DOMAIN above set to "example.com":
# [[routes]]
# pattern = "*.example.com/*"
# zone_name = "example.com"
#
# [[routes]]
# pattern = "example.com/*"
# zone_name = "example.com"
